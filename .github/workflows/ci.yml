name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint + formatação
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar tooling
        run: npm ci

      - name: Prettier (check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

  api:
    name: API (build + cobertura)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Testes + cobertura (100% exigido)
        run: npm run test:coverage

  compose:
    name: Validar docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validar sintaxe do compose
        run: docker compose config -q
