global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  # O próprio Prometheus
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Saúde do host (CPU, RAM, disco)
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # Métricas por container da stack
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Métricas da API (prom-client) — sem autenticação, HTTP simples
  - job_name: api
    static_configs:
      - targets: ["api:3000"]

  # Sonda HTTP dos endpoints da API (up/down, latência)
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://api:3000
        labels:
          endpoint_type: root
          env: local
      - targets:
          - http://api:3000/ready
        labels:
          endpoint_type: ready
          env: local
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
